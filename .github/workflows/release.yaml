name: Automated release

on:
  workflow_run:
    workflows: [Code quality check]
    types:
      - completed

  # push:
  #   branches:
  #     - main
  #   tags:
  #     - "v*"
  # pull_request:
  #   branches:
  #     - main

permissions:
  contents: write
  pull-requests: write

jobs:
  compile-binaries:
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    env:
      BIN_NAME: script
      APP_NAME: scriptian
    steps:
      - uses: actions/checkout@v4

      - name: Install zip (Windows only)
        if: ${{ matrix.os == 'windows-latest' }}
        run: choco install zip -y

      - name: Install Rust
        if: ${{ matrix.os != 'windows-latest' }}
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Add target for cross-compilation
        run: |
          rustup target add ${{ matrix.target }}

      - name: Compile binary
        run: |
          if [[ ${{ matrix.os }} == "windows-latest" ]]; then
            cargo build --release
          else
            cargo install cross
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Package the binary
        run: |
          EXT=$([[ ${{ matrix.os }} == "windows-latest" ]] && printf ".exe" || printf "")
          ARCH=""

          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)    ARCH="linux-x64" ;;
            aarch64-unknown-linux-gnu)   ARCH="linux-arm64" ;;
            x86_64-pc-windows-gnu)      ARCH="windows-x64" ;;
            x86_64-apple-darwin)         ARCH="macos-x64" ;;
            aarch64-apple-darwin)        ARCH="macos-arm64" ;;
            *) echo "Unknown target"; exit 1 ;;
          esac

          mkdir -p dist
          zip -j dist/${{ env.APP_NAME }}-$ARCH.zip \
                 README.md \
                 LICENSE \
                 target/release/${{ env.BIN_NAME }}$EXT

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.target }}-package
          path: dist/

  release:
    name: Create release
    needs: compile-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Run Release Please
        id: release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_SECRET }}
          release-type: rust

      - name: Upload Release Artifact
        if: ${{ steps.release-please.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find dist -type f

          find dist -name "*.zip" -exec gh release upload ${{ steps.release-please.outputs.tag_name }} {} --clobber \;
